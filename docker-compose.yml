services:
  postgres:
    image: postgres:17-alpine
    container_name: luypos-postgres
    environment:
      POSTGRES_DB: luypos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - luypos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luypos"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    container_name: luypos-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=luypos;Username=postgres;Password=postgres
      DOTNET_USE_POLLING_FILE_WATCHER: 1
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: 1
    ports:
      - "5178:8080"
    volumes:
      - ./backend:/src
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: luypos-frontend
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  luypos_postgres_data:
