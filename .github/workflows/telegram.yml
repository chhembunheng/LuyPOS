- name: Send Telegram Notification
  run: |
    EVENT="${{ github.event_name }}"
    BRANCH="${{ github.ref_name }}"
    REPO="${{ github.repository }}"
    ACTOR="${{ github.actor }}"

    if [ "$EVENT" = "pull_request" ]; then
      ACTION="${{ github.event.action }}"
      MERGED="${{ github.event.pull_request.merged }}"

      if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
        TEXT=$'🔥 PR MERGED\n\nRepo: '"$REPO"$'\nBranch: '"$BRANCH"$'\nBy: '"$ACTOR"
      else
        TEXT=$'🔄 PR EVENT\n\nRepo: '"$REPO"$'\nBranch: '"$BRANCH"$'\nBy: '"$ACTOR"
      fi
    else
      TEXT=$'🚀 PUSH EVENT\n\nRepo: '"$REPO"$'\nBranch: '"$BRANCH"$'\nBy: '"$ACTOR"
    fi

    curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
      -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
      -d message_thread_id="${{ secrets.TELEGRAM_THREAD_ID }}" \
      --data-urlencode "text=$TEXT"