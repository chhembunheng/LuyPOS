name: Telegram Notifications

on:
  push:
  pull_request:
    types: [opened, closed, reopened, synchronize]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Notification
        run: |
          set -e

          EVENT="${{ github.event_name }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          COMMIT="${{ github.event.head_commit.message }}"

          if [ "$EVENT" = "pull_request" ]; then
            ACTION="${{ github.event.action }}"
            TITLE="${{ github.event.pull_request.title }}"
            MERGED="${{ github.event.pull_request.merged }}"

            STATUS="вҡҷпёҸ UPDATED"
            ICON="рҹ”„"

            if [ "$ACTION" = "opened" ]; then
              STATUS="рҹҶ• OPENED"
              ICON="рҹ“ў"
            fi

            if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
              STATUS="рҹ”Ҙ MERGED"
              ICON="рҹҡҖ"
            fi

            TEXT=$(printf "рҹ“Ұ GITHUB PULL REQUEST\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\nрҹҡҰ Status\n   вҶ’ %s %s\n\nрҹ“Ң Title\n   вҶ’ %s\n\nрҹҢҝ Branch\n   вҶ’ %s\n\nрҹ‘Ө Author\n   вҶ’ %s\n\nрҹ“Ғ Repository\n   вҶ’ %s\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ" \
              "$ICON" "$STATUS" "$TITLE" "$BRANCH" "$ACTOR" "$REPO")

          else
            TEXT=$(printf "рҹҡҖ GITHUB PUSH EVENT\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n\nрҹ“Ң Commit\n   вҶ’ %s\n\nрҹҢҝ Branch\n   вҶ’ %s\n\nрҹ‘Ө Author\n   вҶ’ %s\n\nрҹ“Ғ Repository\n   вҶ’ %s\n\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ" \
              "$COMMIT" "$BRANCH" "$ACTOR" "$REPO")
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d message_thread_id="${{ secrets.TELEGRAM_THREAD_ID }}" \
            --data-urlencode "text=$TEXT"
