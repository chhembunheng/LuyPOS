name: Telegram Notifications

on:
  push:
  pull_request:
    types: [opened, closed, reopened, synchronize]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Notification
        run: |
          EVENT="${{ github.event_name }}"
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          COMMIT="${{ github.event.head_commit.message }}"

          if [ "$EVENT" = "pull_request" ]; then
            ACTION="${{ github.event.action }}"
            TITLE="${{ github.event.pull_request.title }}"
            MERGED="${{ github.event.pull_request.merged }}"

            if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
              STATUS="рџ”Ґ MERGED"
              ICON="рџљЂ"
            elif [ "$ACTION" = "opened" ]; then
              STATUS="рџ“ў OPENED"
              ICON="рџ†•"
            else
              STATUS="рџ”„ UPDATED"
              ICON="вљ™пёЏ"
            fi

            TEXT=$'рџ“¦ *GITHUB PULL REQUEST*\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n'$ICON' Status: '"$STATUS"$'\nрџ“Њ Title: '"$TITLE"$'\nрџЊї Branch: '"$BRANCH"$'\nрџ‘¤ By: '"$ACTOR"$'\n\nрџ“Ѓ Repo: '"$REPO"$'\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ'

          else
            TEXT=$'рџљЂ *GITHUB PUSH EVENT*\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ“Њ Commit: '"$COMMIT"$'\nрџЊї Branch: '"$BRANCH"$'\nрџ‘¤ By: '"$ACTOR"$'\nрџ“Ѓ Repo: '"$REPO"$'\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ'
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d message_thread_id="${{ secrets.TELEGRAM_THREAD_ID }}" \
            --data-urlencode "text=$TEXT" \
            -d parse_mode="Markdown"